        }
        .profile-info h2 {

        }
        .profile-info p {
            font-size: 0.9rem; color: #94a3b8;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block; font-size: 0.85rem; font-weight: 600;
            color: #cbd5e1; margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%; padding: 0.8rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; color: #f8fafc;
            background: rgba(15, 23, 42, 0.6);
            outline: none;
            transition: all 0.2s ease;
        }
        .form-group input:focus {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }
        .form-group input:disabled {
            background: rgba(15, 23, 42, 0.3); color: #64748b; cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.05);
        }
        .form-hint {
            font-size: 0.75rem; color: #64748b; margin-top: 0.4rem;
        }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.6rem;
            padding: 0.8rem 1.5rem; border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.2s ease;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(180deg, #123057, #0a1c33);
            color: #fff;
            box-shadow: 0 8px 20px -8px rgba(10, 28, 51, 0.5);
        }
        .btn-primary:hover {
            background: linear-gradient(180deg, #16406f, #123057);
            box-shadow: 0 12px 26px -8px rgba(10, 28, 51, 0.6);
        }
        .btn-primary:disabled { 
            background: #334155; color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; 
        }
        #vn-toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(15, 23, 42, 0.9); color: #fff; font-size: 0.85rem; font-weight: 500;
            padding: 0.8rem 1.6rem; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
            opacity: 0; transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none; white-space: nowrap; z-index: 9999;
        }
        #vn-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #vn-toast.toast-ok  { border-color: #10b981; color: #34d399; }
        #vn-toast.toast-err { border-color: #ef4444; color: #f87171; }
        @media (max-width: 768px) {
            .container  { padding: 0 1.5rem; }
            .page-title { font-size: 1.5rem; }
        }
        @media (max-width: 640px) {

            .profile-header { flex-direction: column; text-align: center; gap: 1rem; }
            .profile-avatar { margin: 0 auto; }

<script>
(function () {
    var toast = document.getElementById('vn-toast');
    var _toastTimer;
    function showToast(msg, type) {
        clearTimeout(_toastTimer);
        toast.textContent = msg;
        toast.className = 'show ' + (type === 'ok' ? 'toast-ok' : type === 'err' ? 'toast-err' : '');
        _toastTimer = setTimeout(function () { toast.className = ''; }, 3200);
    }
        var savedName   = localStorage.getItem('vn_display_name') || '';
        var email = sessionStorage.getItem('vn_user') || localStorage.getItem('vn_user') || '';
        
        var inputEmail = document.getElementById('input-email');
        if(inputEmail) inputEmail.value = email;
        
        var emailLabel = document.getElementById('email-label');
        if(emailLabel) emailLabel.textContent = email || 'Usuario';
        
        var inputName = document.getElementById('input-name');
        if(inputName) inputName.value = savedName;
        
        var displayNameLabel = document.getElementById('display-name-label');
        if(displayNameLabel) displayNameLabel.textContent = savedName || 'Usuario';

        document.getElementById('btn-save-profile').addEventListener('click', function () {
            var name = document.getElementById('input-name').value.trim();
            localStorage.setItem('vn_display_name', name);
            document.getElementById('display-name-label').textContent = name || 'Usuario';
            showToast('Perfil guardado', 'ok');
        });



        document.getElementById('btn-save-pass').addEventListener('click', async function () {
            var curr    = document.getElementById('input-curr-pass').value;
            var next    = document.getElementById('input-new-pass').value;
            var confirm = document.getElementById('input-confirm-pass').value;
            if (!curr || !next || !confirm) {
                showToast('Completa todos los campos', 'err'); return;
            }
            if (next.length < 8 || next.length > 128) {
                showToast('La contraseña debe tener entre 8 y 128 caracteres', 'err'); return;
            }
            if (next !== confirm) {
                showToast('Las contraseñas no coinciden', 'err'); return;
            }
            var btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cambiando…';
            try {
                var r = await fetch('/api/change-password', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPassword: curr, newPassword: next }),
                });
                var data = await r.json();
                if (data.success) {
                    showToast('Contraseña actualizada correctamente', 'ok');
                    document.getElementById('input-curr-pass').value = '';
                    document.getElementById('input-new-pass').value  = '';
                    document.getElementById('input-confirm-pass').value = '';
                } else {
                    showToast(data.error || 'Error al cambiar la contraseña', 'err');
                }
            } catch (e) {
                showToast('Error de conexión', 'err');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key"></i> Cambiar contraseña';
            }
        });
    } catch (err) {
        console.error('Config init error:', err);
    } finally {
        if (window.VNLoader) window.VNLoader.hide();
    }
})();
</script>

<script src="../js/mailbox.js"></script>
<script>
    // Dark Mode Listener
    const themeBtn = document.getElementById('themeToggleBtn');
    if (themeBtn) {
        const setBtnIcon = () => {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                themeBtn.innerHTML = '<i class="fas fa-moon"></i>';
            }
        };
        setBtnIcon();
        themeBtn.addEventListener('click', () => {
            if(document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('vn_theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('vn_theme', 'dark');
            }
            setBtnIcon();
        });
    }
</script>
<script>
(function () {
    const hamBtn = document.getElementById('hamBtn');
    const mainNav = document.getElementById('mainNav');
    if (!hamBtn || !mainNav || hamBtn.dataset.vnHeaderBound === '1') return;
    hamBtn.dataset.vnHeaderBound = '1';
    hamBtn.addEventListener('click', () => {
        hamBtn.classList.toggle('vn-ham-open');
        mainNav.classList.toggle('vn-nav-open');
    });
})();
</script>
