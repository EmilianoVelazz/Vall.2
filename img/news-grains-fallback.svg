<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Mercado internacional de granos</title>
  <desc id="desc">Ilustración editorial de espigas y campos agrícolas para noticias de granos.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d3b52"/>
      <stop offset="1" stop-color="#2e7380"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7a62a"/>
      <stop offset="1" stop-color="#7b8f2a"/>
