<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VallNews · Dashboard configurable (rediseño)</title>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="../js/components/filter-bar.js"></script>
  <script src="../js/components/chart-card.js"></script>
  <script src="../js/components/data-grid.js"></script>

  <style>
    :root {
      --bg:#eef2f7; --panel:#ffffff; --panel-2:#f5f8fb; --ink:#00213a; --muted:#5b6b7d;
      --border:#d8e0ea; --accent:#00213a; --accent-ink:#ffffff; --up:#0e7a40; --down:#c0392b;
      --mono:'JetBrains Mono', ui-monospace, 'SFMono-Regular', 'Cascadia Code', Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#070e16; --panel:#0b1622; --panel-2:#10202f; --ink:#e8eff7; --muted:#8aa0b6;
              --border:#1e3242; --accent:#4aa3ff; --accent-ink:#06111c; }
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink);
           font-family:'Inter',system-ui,-apple-system,sans-serif; }

    /* ── Barra superior ── */
    .topbar { position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:1rem;
      padding:.7rem 1.1rem; background:var(--accent); color:var(--accent-ink);
      border-bottom:1px solid var(--border); }
    .brand { display:flex; align-items:baseline; gap:.5rem; font-weight:800; letter-spacing:.02em; }
    .brand .v { font-size:1.05rem; }
    .brand .tag { font-family:var(--mono); font-size:.6rem; opacity:.8; text-transform:uppercase; letter-spacing:.12em; }
    .clock { margin-left:auto; font-family:var(--mono); font-size:.72rem; opacity:.9; font-variant-numeric:tabular-nums; }
    .btn { font:inherit; font-size:.72rem; font-weight:700; cursor:pointer; border-radius:6px;
      padding:.4rem .8rem; border:1px solid rgba(255,255,255,.35); background:rgba(255,255,255,.12);
      color:var(--accent-ink); text-transform:uppercase; letter-spacing:.04em; }
    .btn:hover { background:rgba(255,255,255,.22); }
    .btn.active { background:#fff; color:var(--accent); }
    @media (prefers-color-scheme: dark){ .btn.active{ background:var(--accent); color:var(--accent-ink);} }

    /* ── Ticker en cinta ── */
    .tape { overflow:hidden; white-space:nowrap; background:var(--panel); border-bottom:1px solid var(--border);
      font-family:var(--mono); font-size:.72rem; }
    .tape .row { display:inline-flex; gap:1.6rem; padding:.4rem 1rem; animation:tape 40s linear infinite; }
    .tape .it { color:var(--muted); }
    .tape .it b { color:var(--ink); }
    .tape .up{ color:var(--up);} .tape .dn{ color:var(--down);}
    @keyframes tape { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    /* ── Contenedor ── */
    .wrap { max-width:1240px; margin:0 auto; padding:1.1rem; }
    .pagefilters { margin-bottom:1rem; }
    .hint { font-size:.72rem; color:var(--muted); margin:.2rem 0 1rem; }
    .hint code { font-family:var(--mono); background:var(--panel); border:1px solid var(--border);
      border-radius:4px; padding:.02rem .3rem; }

    /* ── Paleta de widgets (modo edición) ── */
    .palette { display:none; gap:.5rem; flex-wrap:wrap; align-items:center;
      padding:.7rem .8rem; margin-bottom:1rem; background:var(--panel); border:1px dashed var(--accent);
      border-radius:8px; }
    body.editing .palette { display:flex; }
    .palette .lbl { font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
    .palette button { font:inherit; font-size:.72rem; font-weight:600; cursor:pointer; border-radius:6px;
      padding:.35rem .7rem; border:1px solid var(--border); background:var(--panel-2); color:var(--ink); }
    .palette button:hover { border-color:var(--accent); }

    /* ── Rejilla de feed ── */
    .feed { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:.9rem; }
    @media (max-width:820px){ .feed{ grid-template-columns:1fr; } }
    .widget { grid-column:span var(--w,1); background:var(--panel); border:1px solid var(--border);
      border-radius:8px; overflow:hidden; display:flex; flex-direction:column; }
    @media (max-width:820px){ .widget{ grid-column:span 1 !important; } }
    .w-head { display:flex; align-items:center; gap:.5rem; padding:.5rem .7rem;
      background:var(--panel-2); border-bottom:1px solid var(--border); }
    .w-title { font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
    .w-tools { margin-left:auto; display:none; gap:.25rem; }
    body.editing .w-tools { display:flex; }
    body.editing .widget { outline:1px dashed var(--accent); cursor:grab; }
    body.editing .widget.dragging { opacity:.45; }
    .w-tools button { font:inherit; font-size:.7rem; line-height:1; cursor:pointer; border-radius:4px;
      width:1.5rem; height:1.5rem; border:1px solid var(--border); background:var(--panel); color:var(--ink); }
    .w-tools button:hover { border-color:var(--accent); }
    .w-body { padding:.7rem; }
    .w-empty { color:var(--muted); font-family:var(--mono); font-size:.78rem; padding:2rem; text-align:center; }

    /* Watchlist widget */
    .wl { display:flex; flex-direction:column; gap:.35rem; }
    .wl-row { display:flex; align-items:center; justify-content:space-between; gap:.5rem;
      padding:.4rem .5rem; border:1px solid var(--border); border-radius:6px; background:var(--panel-2); }
    .wl-t { font-family:var(--mono); font-weight:700; font-size:.78rem; }
    .wl-p { font-family:var(--mono); font-size:.72rem; font-variant-numeric:tabular-nums; }
    .wl-p.up{color:var(--up);} .wl-p.dn{color:var(--down);}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="v">VALLNEWS</span><span class="tag">Terminal · Finanzas</span></div>
    <span class="clock" id="clock">—</span>
    <button class="btn" id="editBtn">✎ Personalizar feed</button>
    <button class="btn" id="resetBtn" title="Restaurar disposición por defecto">↺</button>
  </div>

  <div class="tape"><div class="row" id="tape"></div></div>

  <div class="wrap">
    <div class="pagefilters">
      <vn-filter-bar id="page-bar"></vn-filter-bar>
    </div>
    <div class="hint">Filtro <b>País</b> arriba re-filtra todos los widgets de indicadores. Pulsa
      <code>✎ Personalizar feed</code> para reordenar (arrastrar), cambiar ancho, quitar o agregar widgets — tu disposición se guarda automáticamente.</div>

    <div class="palette" id="palette"><span class="lbl">Agregar widget:</span></div>

    <div class="feed" id="feed"></div>
  </div>

  <script>
  // ────────────────────────────────────────────────────────────────────────────
  //  Registro de widgets. Cada tipo sabe renderizar su cuerpo. Los de datos
  //  (data-grid) exponen refresh(country) para reaccionar al filtro global.
  // ────────────────────────────────────────────────────────────────────────────
  const CHART_INSTRUMENTS = [
    { label:'🇲🇽 México', options:[
      {value:'GFNORTEO.MX',label:'Banorte'},{value:'WALMEX.MX',label:'Walmart Méx.'},
      {value:'^MXX',label:'IPC (BMV)'},{value:'FEMSAUBD.MX',label:'FEMSA'} ] },
    { label:'🇺🇸 EE.UU.', options:[
      {value:'AAPL',label:'Apple'},{value:'MSFT',label:'Microsoft'},{value:'NVDA',label:'NVIDIA'},
      {value:'^GSPC',label:'S&P 500'} ] },
    { label:'Materias / Divisas', options:[
      {value:'GC=F',label:'Oro'},{value:'CL=F',label:'WTI'},{value:'USDMXN=X',label:'USD/MXN'},
      {value:'BTC-USD',label:'Bitcoin'} ] },
  ];
  const IV = {
    '1mo':{interval:'1d',range:'1mo'}, '6mo':{interval:'1d',range:'6mo'},
    '1y':{interval:'1d',range:'1y'}, '5y':{interval:'1wk',range:'5y'},
  };

  const INDICATORS = [
    { label:'TIIE 28D', value:'8.50%', pct:-0.30, sub:'Banxico', countryCode:'MX' },
    { label:'Cetes 28D', value:'8.40%', pct:-0.12, sub:'Banxico', countryCode:'MX' },
    { label:'USD/MXN', value:'$17.15', pct:-0.22, sub:'Fix', countryCode:'MX' },
    { label:'IPC BMV', value:'58,240', pct:+0.44, sub:'BMV', countryCode:'MX' },
    { label:'S&P 500', value:'6,120', pct:+0.85, sub:'EE.UU.', countryCode:'US' },
    { label:'NASDAQ 100', value:'22,180', pct:+1.10, sub:'Tech', countryCode:'US' },
    { label:'Oro / oz', value:'$4,120', pct:+0.42, sub:'Refugio', countryCode:'GLOBAL' },
    { label:'WTI / bbl', value:'$72.30', pct:-0.90, sub:'Energía', countryCode:'GLOBAL' },
  ];
  const BONDS = [
    { label:'US 10Y', value:'4.51%', pct:+0.30, sub:'Treasury', countryCode:'US' },
    { label:'US 2Y', value:'4.35%', pct:+0.18, sub:'Treasury', countryCode:'US' },
    { label:'Bund 10Y', value:'2.65%', pct:-0.18, sub:'Alemania', countryCode:'EU' },
    { label:'Mbono 10Y', value:'9.20%', pct:-0.25, sub:'México', countryCode:'MX' },
  ];
  const FX = [
    { label:'EUR/MXN', value:'$18.70', pct:+0.12, sub:'Euro', countryCode:'MX' },
    { label:'GBP/MXN', value:'$21.90', pct:-0.08, sub:'Libra', countryCode:'MX' },
    { label:'JPY/MXN', value:'$0.117', pct:+0.05, sub:'Yen', countryCode:'MX' },
    { label:'BRL/MXN', value:'$3.05', pct:-0.20, sub:'Real', countryCode:'MX' },
  ];
  const WATCH = [
    { t:'AAPL', p:'308.63', pct:+1.2 }, { t:'NVDA', p:'176.40', pct:+2.8 },
    { t:'^MXX', p:'58,240', pct:+0.44 }, { t:'BTC-USD', p:'96,120', pct:-1.1 },
  ];

  const WIDGETS = {
    chart: { title:'Gráfico de precios', w:2, build: buildChartWidget },
    indicators: { title:'Indicadores clave', w:2, build: (b)=>buildGrid(b, INDICATORS, 150) },
    bonds: { title:'Rendimientos de bonos', w:1, build: (b)=>buildGrid(b, BONDS, 130) },
    fx: { title:'Divisas', w:1, build: (b)=>buildGrid(b, FX, 130) },
    watchlist: { title:'Watchlist', w:1, build: buildWatchlist },
  };

  function buildGrid(body, items, minTile) {
    const g = document.createElement('vn-data-grid');
    g.setAttribute('min-tile', minTile);
    g.items = items;
    g.setAttribute('filter-country', currentCountry);
    body._gridEl = g;
    body.appendChild(g);
  }
  function buildWatchlist(body) {
    const wl = document.createElement('div'); wl.className = 'wl';
    wl.innerHTML = WATCH.map(w => `<div class="wl-row">
        <span class="wl-t">${w.t}</span>
        <span><span class="wl-p">${w.p}</span> <span class="wl-p ${w.pct>=0?'up':'dn'}">${w.pct>=0?'▲ +':'▼ '}${Math.abs(w.pct).toFixed(2)}%</span></span>
      </div>`).join('');
    body.appendChild(wl);
  }
  function buildChartWidget(body) {
    const bar = document.createElement('vn-filter-bar');
    const card = document.createElement('vn-chart-card');
    card.setAttribute('card-title', 'Evolución del precio');
    card.setAttribute('height', '300');
    card.setAttribute('chart-type', 'candlestick');
    card.style.cssText = 'display:block;margin-top:.6rem;';
    body.append(bar, card);
    bar.filters = [
      { id:'instrument', label:'Instrumento', type:'select', value:'AAPL', options: CHART_INSTRUMENTS },
      { id:'range', label:'Rango', type:'segmented', value:'1y', options:[
        {value:'1mo',label:'1M'},{value:'6mo',label:'6M'},{value:'1y',label:'1A'},{value:'5y',label:'5A'} ] },
    ];
    async function load() {
      const v = bar.values; const { interval, range } = IV[v.range] || IV['1y'];
      card.setState('loading', 'Cargando…');
      try {
        const r = await fetch(`/api/stock-history?ticker=${encodeURIComponent(v.instrument)}&interval=${interval}&range=${range}`);
        if (!r.ok) throw new Error('HTTP '+r.status);
        const { candles, meta } = await r.json();
        if (!candles || !candles.length) { card.setState('empty','Sin datos'); return; }
        card.setData(candles);
        card.setMeta({ name: meta.longName || v.instrument, price: meta.regularMarketPrice,
          pct: meta.regularMarketChangePercent, high: meta.regularMarketDayHigh,
          low: meta.regularMarketDayLow, currency: meta.currency });
      } catch (e) { card.setState('error', 'No se pudo cargar (¿backend?).'); }
    }
    bar.addEventListener('vn-filter-change', load);
    load();
  }

  // ────────────────────────────────────────────────────────────────────────────
  //  Estado del feed (persistido en localStorage) + render
  // ────────────────────────────────────────────────────────────────────────────
  const LS_KEY = 'vn_dash_v1';
  const DEFAULT = [
    { type:'chart', w:2 }, { type:'indicators', w:2 },
    { type:'bonds', w:1 }, { type:'fx', w:1 }, { type:'watchlist', w:1 },
  ];
  let layout = load();
  let currentCountry = 'ALL';

  function load() {
    try { const s = JSON.parse(localStorage.getItem(LS_KEY)); if (Array.isArray(s) && s.length) return s; } catch {}
    return DEFAULT.map(x => ({ ...x }));
  }
  function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(layout)); } catch {} }

  const feed = document.getElementById('feed');

  function render() {
    feed.innerHTML = '';
    layout.forEach((w, idx) => {
      const def = WIDGETS[w.type]; if (!def) return;
      const el = document.createElement('div');
      el.className = 'widget'; el.style.setProperty('--w', w.w || def.w || 1);
      el.dataset.idx = idx;
      el.innerHTML = `<div class="w-head">
          <span class="w-title">${def.title}</span>
          <span class="w-tools">
            <button data-act="up" title="Subir">↑</button>
            <button data-act="down" title="Bajar">↓</button>
            <button data-act="wide" title="Ancho">⇔</button>
            <button data-act="del" title="Quitar">✕</button>
          </span>
        </div><div class="w-body"></div>`;
      const body = el.querySelector('.w-body');
      try { def.build(body); } catch (e) { body.innerHTML = '<div class="w-empty">Error al construir widget.</div>'; }
      wireWidget(el, idx);
      feed.appendChild(el);
    });
  }

  function wireWidget(el, idx) {
    el.querySelectorAll('.w-tools button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const act = btn.dataset.act;
        if (act === 'del') layout.splice(idx, 1);
        else if (act === 'wide') layout[idx].w = (layout[idx].w === 2 ? 1 : 2);
        else if (act === 'up' && idx > 0) [layout[idx-1], layout[idx]] = [layout[idx], layout[idx-1]];
        else if (act === 'down' && idx < layout.length-1) [layout[idx+1], layout[idx]] = [layout[idx], layout[idx+1]];
        save(); render();
      });
    });
    // Arrastrar para reordenar (modo edición)
    el.setAttribute('draggable', 'true');
    el.addEventListener('dragstart', (e) => {
      if (!document.body.classList.contains('editing')) { e.preventDefault(); return; }
      el.classList.add('dragging'); e.dataTransfer.setData('text/plain', idx);
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('dragover', (e) => { if (document.body.classList.contains('editing')) e.preventDefault(); });
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      const from = parseInt(e.dataTransfer.getData('text/plain'), 10);
      const to = idx;
      if (Number.isNaN(from) || from === to) return;
      const [moved] = layout.splice(from, 1);
      layout.splice(to, 0, moved);
      save(); render();
    });
  }

  // ── Paleta: agregar widgets ──
  const palette = document.getElementById('palette');
  Object.entries(WIDGETS).forEach(([type, def]) => {
    const b = document.createElement('button');
    b.textContent = '+ ' + def.title;
    b.addEventListener('click', () => { layout.push({ type, w: def.w || 1 }); save(); render(); });
    palette.appendChild(b);
  });

  // ── Filtros de página (país) ──
  const pageBar = document.getElementById('page-bar');
  pageBar.filters = [
    { id:'country', label:'País', type:'select', value:'ALL', options:[
      {value:'ALL',label:'Todos'},{value:'MX',label:'México'},{value:'US',label:'EE.UU.'},
      {value:'EU',label:'Zona Euro'},{value:'GLOBAL',label:'Global'} ] },
    { id:'theme', label:'Vista', type:'segmented', value:'feed', options:[
      {value:'feed',label:'Mi feed'},{value:'all',label:'Todo'} ] },
  ];
  pageBar.addEventListener('vn-filter-change', (e) => {
    if (e.detail.id === 'country') {
      currentCountry = e.detail.value;
      feed.querySelectorAll('.w-body').forEach(b => {
        if (b._gridEl) b._gridEl.setAttribute('filter-country', currentCountry);
      });
    }
  });

  // ── Modo edición ──
  const editBtn = document.getElementById('editBtn');
  editBtn.addEventListener('click', () => {
    const on = document.body.classList.toggle('editing');
    editBtn.classList.toggle('active', on);
    editBtn.textContent = on ? '✓ Listo' : '✎ Personalizar feed';
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    layout = DEFAULT.map(x => ({ ...x })); save(); render();
  });

  // ── Cinta + reloj ──
  const tape = document.getElementById('tape');
  const tapeItems = [...INDICATORS, ...BONDS].map(i =>
    `<span class="it"><b>${i.label}</b> ${i.value} <span class="${i.pct>=0?'up':'dn'}">${i.pct>=0?'▲':'▼'}${Math.abs(i.pct).toFixed(2)}%</span></span>`).join('');
  tape.innerHTML = tapeItems + tapeItems;
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('es-MX',{day:'2-digit',month:'short'}).toUpperCase() + ' · ' +
      now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  tick(); setInterval(tick, 1000);

  render();
  </script>
</body>
</html>
